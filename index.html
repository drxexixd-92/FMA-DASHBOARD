<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM Academy — Hail | Premium Quality Dashboard</title>

<!-- Premium Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Lexend:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ═════════════════════════════════════════════════ */
/*   FM ACADEMY — Premium Medical Theme v2.0        */
/* ═════════════════════════════════════════════════ */

:root{
  /* Royal Medical Blue Palette */
  --p1:#0A2540;       /* Deepest navy */
  --p2:#0E3A6F;       /* Deep royal blue */
  --p3:#1565C0;       /* Medical blue */
  --p4:#2196F3;       /* Bright blue */
  --p5:#64B5F6;       /* Soft blue */
 
  /* Healing Teal */
  --t1:#004D40;
  --t2:#00695C;
  --t3:#009688;
  --t4:#26A69A;
  --t5:#80CBC4;
 
  /* Premium Gold */
  --g1:#8B6914;
  --g2:#B8860B;
  --g3:#D4AF37;
  --g4:#F0C419;
  --g5:#FFD700;
 
  /* Levels */
  --r1c:#1565C0;      /* R1 — Royal Blue */
  --r2c:#6A1B9A;      /* R2 — Royal Purple */
  --r3c:#00838F;      /* R3 — Deep Teal */
 
  /* Surfaces */
  --bg:#F5F7FA;
  --bg2:#EBF1F7;
  --card:#FFFFFF;
  --card2:#FAFCFE;
  --border:#E3E8F0;
  --border2:#D5DDE9;
 
  /* Text */
  --tx1:#0A1929;
  --tx2:#1E293B;
  --tx3:#475569;
  --tx4:#94A3B8;
  --tx5:#CBD5E1;
 
  /* Status */
  --success:#2E7D32;
  --success-bg:#E8F5E9;
  --warning:#F57C00;
  --warning-bg:#FFF3E0;
  --danger:#C62828;
  --danger-bg:#FFEBEE;
  --info:#0277BD;
  --info-bg:#E1F5FE;
 
  /* Shadows */
  --sh-sm:0 1px 3px rgba(10,37,64,0.06);
  --sh:0 4px 16px rgba(10,37,64,0.08);
  --sh-md:0 8px 24px rgba(10,37,64,0.10);
  --sh-lg:0 16px 48px rgba(10,37,64,0.14);
  --sh-glow:0 0 24px rgba(33,150,243,0.15);
  --sh-gold:0 0 16px rgba(212,175,55,0.25);
 
  /* Gradients */
  --grad-primary:linear-gradient(135deg,#0E3A6F 0%,#1565C0 50%,#2196F3 100%);
  --grad-deep:linear-gradient(135deg,#0A2540 0%,#0E3A6F 100%);
  --grad-teal:linear-gradient(135deg,#004D40,#009688);
  --grad-gold:linear-gradient(135deg,#B8860B,#D4AF37,#F0C419);
  --grad-card:linear-gradient(135deg,#FFFFFF 0%,#FAFCFE 100%);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  background:var(--bg);
  color:var(--tx1);
  -webkit-font-smoothing:antialiased;
  font-feature-settings:'cv11','ss01';
  line-height:1.5;
  min-height:100vh;
}
.ar{font-family:'IBM Plex Sans Arabic','Tahoma',Arial,sans-serif}
.serif{font-family:'Playfair Display',Georgia,serif}
.mono{font-family:'Lexend',monospace;font-variant-numeric:tabular-nums}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:#F1F5F9}
::-webkit-scrollbar-thumb{background:linear-gradient(135deg,#94A3B8,#64748B);border-radius:5px;border:2px solid #F1F5F9}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(135deg,#64748B,#475569)}

/* ═══════════════ APP LAYOUT ═══════════════ */
.app{
  min-height:100vh;
  display:flex;
  background:var(--bg);
}

/* ═══════════════ SIDEBAR (Premium Dark) ═══════════════ */
.sb{
  width:260px;
  background:var(--grad-deep);
  border-right:1px solid rgba(255,255,255,0.05);
  flex-shrink:0;
  height:100vh;
  overflow-y:auto;
  position:sticky;
  top:0;
  z-index:30;
  box-shadow:var(--sh-md);
}

.sb::-webkit-scrollbar{width:6px}
.sb::-webkit-scrollbar-track{background:transparent}
.sb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;border:none}

.sh{
  display:flex;
  align-items:center;
  gap:12px;
  padding:22px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:relative;
}
.sh::after{
  content:'';
  position:absolute;
  bottom:-1px;left:20px;right:20px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,0.4),transparent);
}

.sl{
  width:46px;
  height:46px;
  background:var(--grad-gold);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--p1);
  font-weight:800;
  font-size:15px;
  font-family:'Playfair Display',serif;
  letter-spacing:-0.5px;
  box-shadow:var(--sh-gold),inset 0 1px 0 rgba(255,255,255,0.4);
  position:relative;
}
.sl::after{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:12px;
  background:linear-gradient(135deg,#FFD700,transparent);
  z-index:-1;
  opacity:0.4;
  filter:blur(8px);
}

.sh-text{flex:1;min-width:0}
.sh-title{
  font-family:'Playfair Display',serif;
  font-size:16px;
  font-weight:700;
  color:#fff;
  letter-spacing:-0.3px;
  line-height:1.1;
}
.sh-sub{
  font-size:10px;
  color:#94B5D8;
  margin-top:3px;
  text-transform:uppercase;
  letter-spacing:0.1em;
  font-weight:500;
}

.banner{
  margin:14px;
  padding:14px 14px;
  background:linear-gradient(135deg,rgba(212,175,55,0.12),rgba(212,175,55,0.04));
  border:1px solid rgba(212,175,55,0.25);
  border-radius:10px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.banner::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,#D4AF37,transparent);
}
.banner-icon{font-size:18px;margin-bottom:4px;display:inline-block;filter:drop-shadow(0 0 8px rgba(212,175,55,0.4))}
.banner-title{
  font-size:12px;
  font-weight:700;
  color:#F0C419;
  letter-spacing:0.04em;
}
.banner-sub{
  font-size:9px;
  color:#D4AF37;
  margin-top:2px;
  text-transform:uppercase;
  letter-spacing:0.1em;
}

nav{padding:8px 12px;display:flex;flex-direction:column;gap:3px}

.nav-section{
  font-size:9px;
  color:#5A7AAA;
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-weight:700;
  padding:14px 12px 6px;
}

.nb{
  width:100%;
  display:flex;
  align-items:center;
  gap:12px;
  padding:11px 14px;
  border-radius:9px;
  font-size:13px;
  color:#B5C9E2;
  background:transparent;
  border:none;
  cursor:pointer;
  text-align:left;
  font-family:inherit;
  font-weight:500;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}
.nb::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:transparent;
  border-radius:0 3px 3px 0;
  transition:all .2s;
}
.nb:hover{
  background:rgba(255,255,255,0.05);
  color:#fff;
  transform:translateX(2px);
}
.nb:hover::before{background:rgba(212,175,55,0.4)}
.nb.act{
  background:linear-gradient(90deg,rgba(212,175,55,0.15),rgba(212,175,55,0.05) 70%,transparent);
  color:#F0C419;
  font-weight:600;
  box-shadow:inset 0 0 0 1px rgba(212,175,55,0.2);
}
.nb.act::before{
  background:linear-gradient(180deg,#D4AF37,#F0C419);
  box-shadow:0 0 8px rgba(212,175,55,0.5);
}
.nb-icon{
  font-size:16px;
  width:22px;
  text-align:center;
  flex-shrink:0;
  filter:grayscale(0.3);
  transition:filter .2s;
}
.nb:hover .nb-icon,.nb.act .nb-icon{filter:grayscale(0)}

.foot-info{
  margin:auto 14px 14px;
  padding:14px 12px;
  font-size:9px;
  color:#7A95B5;
  border-top:1px solid rgba(255,255,255,0.06);
  text-align:center;
  line-height:1.6;
  font-weight:500;
  letter-spacing:0.04em;
}
.foot-info strong{color:#94B5D8;font-weight:700;display:block;margin-bottom:2px}

/* ═══════════════ MAIN CONTENT ═══════════════ */
main{
  flex:1;
  padding:0;
  overflow-x:hidden;
  background:var(--bg);
}

/* ═══════════════ HERO HEADER ═══════════════ */
.hero{
  background:var(--grad-primary);
  color:#fff;
  padding:36px 32px 80px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at top right,rgba(212,175,55,0.15) 0%,transparent 60%),
    radial-gradient(ellipse at bottom left,rgba(0,150,136,0.1) 0%,transparent 60%);
  pointer-events:none;
}
.hero::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:80px;
  background:linear-gradient(180deg,transparent,var(--bg));
  pointer-events:none;
}

/* Medical pattern overlay */
.hero-pattern{
  position:absolute;
  inset:0;
  opacity:0.06;
  background-image:
    radial-gradient(circle at 20% 50%, white 1px, transparent 1px),
    radial-gradient(circle at 50% 80%, white 1px, transparent 1px),
    radial-gradient(circle at 80% 20%, white 1px, transparent 1px);
  background-size:60px 60px,40px 40px,80px 80px;
  pointer-events:none;
}

.hero-content{
  position:relative;
  max-width:1400px;
  margin:0 auto;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:24px;
  flex-wrap:wrap;
}

.hero-left{flex:1;min-width:280px}
.hero-eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 14px;
  background:rgba(212,175,55,0.18);
  border:1px solid rgba(212,175,55,0.3);
  border-radius:999px;
  font-size:11px;
  font-weight:600;
  color:#FFE082;
  text-transform:uppercase;
  letter-spacing:0.12em;
  margin-bottom:14px;
  box-shadow:0 0 16px rgba(212,175,55,0.15);
}
.hero-eyebrow::before{
  content:'';
  width:6px;
  height:6px;
  background:#F0C419;
  border-radius:50%;
  box-shadow:0 0 8px #F0C419;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(1.3)}
}

.hero h1{
  font-family:'Playfair Display',Georgia,serif;
  font-size:34px;
  font-weight:700;
  letter-spacing:-0.8px;
  line-height:1.15;
  margin-bottom:8px;
  text-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.hero h1 .gold{
  background:var(--grad-gold);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(212,175,55,0.4));
}
.hero-ar{
  font-family:'IBM Plex Sans Arabic',sans-serif;
  font-size:18px;
  font-weight:500;
  color:#B5D4FF;
  margin-bottom:16px;
  direction:rtl;
}
.hero-meta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}
.hero-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 12px;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;
  font-size:11px;
  font-weight:500;
  color:#E0EBFA;
  backdrop-filter:blur(10px);
}
.hero-tag-icon{font-size:13px}

.hero-right{
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.hero-stat{
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:14px;
  padding:14px 20px;
  text-align:center;
  backdrop-filter:blur(12px);
  min-width:90px;
}
.hero-stat-v{
  font-family:'Lexend',sans-serif;
  font-size:30px;
  font-weight:800;
  letter-spacing:-1px;
  background:linear-gradient(135deg,#FFD700,#FFFFFF);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
}
.hero-stat-l{
  font-size:9px;
  color:#B5D4FF;
  text-transform:uppercase;
  letter-spacing:0.1em;
  font-weight:600;
  margin-top:4px;
}

/* ═══════════════ CONTENT WRAPPER ═══════════════ */
.content{
  margin-top:-60px;
  padding:0 32px 40px;
  position:relative;
  z-index:5;
  max-width:1400px;
  margin-left:auto;
  margin-right:auto;
}

/* ═══════════════ KPI CARDS (Premium) ═══════════════ */
.kg{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:24px;
}
.k{
  background:var(--grad-card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px 22px;
  position:relative;
  overflow:hidden;
  box-shadow:var(--sh);
  transition:all .25s cubic-bezier(.4,0,.2,1);
}
.k::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:var(--grad-primary);
  border-radius:16px 16px 0 0;
}
.k.k-trainees::before{background:linear-gradient(90deg,#1565C0,#2196F3)}
.k.k-trainers::before{background:linear-gradient(90deg,#6A1B9A,#9C27B0)}
.k.k-coord::before{background:linear-gradient(90deg,#00838F,#00BCD4)}
.k.k-groups::before{background:linear-gradient(90deg,#B8860B,#F0C419)}
.k:hover{
  transform:translateY(-3px);
  box-shadow:var(--sh-lg);
  border-color:var(--p4);
}
.kt{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:14px;
}
.kt-text{flex:1;min-width:0}
.kl{
  font-size:11px;
  color:var(--tx3);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.08em;
  line-height:1.3;
}
.kla{
  font-size:11px;
  color:var(--tx4);
  font-weight:500;
  margin-top:3px;
  direction:rtl;
}
.ki{
  width:44px;
  height:44px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  flex-shrink:0;
  box-shadow:inset 0 1px 2px rgba(255,255,255,0.5);
}
.k-trainees .ki{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);color:#1565C0}
.k-trainers .ki{background:linear-gradient(135deg,#F3E5F5,#E1BEE7);color:#6A1B9A}
.k-coord .ki{background:linear-gradient(135deg,#E0F7FA,#B2EBF2);color:#00838F}
.k-groups .ki{background:linear-gradient(135deg,#FFF8E1,#FFECB3);color:#B8860B}

.kv{
  font-family:'Lexend',sans-serif;
  font-size:36px;
  font-weight:800;
  color:var(--tx1);
  letter-spacing:-1.5px;
  line-height:1;
  font-variant-numeric:tabular-nums;
}
.k-meta{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  font-size:11px;
  color:var(--tx3);
}
.k-meta-trend{
  display:inline-flex;
  align-items:center;
  gap:3px;
  padding:2px 8px;
  background:var(--success-bg);
  color:var(--success);
  border-radius:6px;
  font-weight:600;
  font-size:10px;
}

/* ═══════════════ ROWS & CARDS ═══════════════ */
.r2{
  display:grid;
  grid-template-columns:1.6fr 1fr;
  gap:18px;
  margin-bottom:18px;
}

.cd{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px 24px;
  margin-bottom:18px;
  box-shadow:var(--sh-sm);
  transition:box-shadow .2s;
}
.cd:hover{box-shadow:var(--sh)}

.cd-hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
  padding-bottom:14px;
  border-bottom:1px solid var(--border);
}
.cd-title{
  font-family:'Playfair Display',serif;
  font-size:18px;
  font-weight:700;
  color:var(--tx1);
  letter-spacing:-0.3px;
}
.cd-sub{
  font-size:11px;
  color:var(--tx3);
  margin-top:3px;
  font-weight:500;
}
.cd-action{
  font-size:11px;
  color:var(--p3);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

/* Group distribution bars */
.br{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:11px;
  font-size:12px;
}
.bl{
  min-width:70px;
  font-weight:600;
  color:var(--tx2);
  font-size:12px;
}
.bt{
  flex:1;
  height:30px;
  background:var(--bg2);
  border-radius:8px;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border);
}
.bf{
  height:100%;
  border-radius:8px;
  display:flex;
  align-items:center;
  padding:0 12px;
  color:#fff;
  font-weight:700;
  font-size:11px;
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.2);
  transition:width .8s cubic-bezier(.4,0,.2,1);
}
.bf::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  border-radius:8px;
}

/* Pie chart container */
.pie-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px 0;
}
.pie-leg{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:14px;
  font-size:12px;
  flex-wrap:wrap;
  font-weight:600;
}
.pie-leg span{display:flex;align-items:center;gap:7px;color:var(--tx2)}
.pie-leg .dot{
  width:12px;
  height:12px;
  border-radius:3px;
  box-shadow:0 0 8px rgba(0,0,0,0.1);
}

/* Leadership cards */
.lg2{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.li{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  background:linear-gradient(135deg,var(--bg2),var(--card));
  border:1px solid var(--border);
  border-radius:12px;
  transition:all .2s;
}
.li:hover{
  border-color:var(--p4);
  transform:translateY(-2px);
  box-shadow:var(--sh);
}
.la{
  width:38px;
  height:38px;
  border-radius:50%;
  background:var(--grad-primary);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:13px;
  flex-shrink:0;
  box-shadow:0 4px 12px rgba(21,101,192,0.25);
  border:2px solid #fff;
}
.ln{
  font-size:12.5px;
  font-weight:600;
  line-height:1.3;
  color:var(--tx1);
}
.lr{
  font-size:10px;
  color:var(--p3);
  font-weight:600;
  margin-top:2px;
  text-transform:uppercase;
  letter-spacing:0.04em;
}

/* ═══════════════ TABS ═══════════════ */
.tb{
  display:flex;
  gap:4px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:5px;
  margin-bottom:18px;
  flex-wrap:wrap;
  box-shadow:var(--sh-sm);
}
.t{
  flex:1;
  min-width:130px;
  padding:11px 14px;
  font-size:13px;
  color:var(--tx3);
  background:transparent;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  font-family:inherit;
  transition:all .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.t:hover{background:var(--bg2);color:var(--tx2)}
.t.act{
  background:var(--grad-primary);
  color:#fff;
  box-shadow:0 4px 12px rgba(21,101,192,0.3);
}

function pieSlice(start,end,color){
  const r=90,cx=100,cy=100;
  const sr=start*Math.PI/180,er=end*Math.PI/180;
  const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr);
  const x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
  const la=end-start>180?1:0;
  return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${la} 1 ${x2} ${y2} Z" fill="${color}"/>`;
}

function mockPerf(id){
  const seed=n=>Math.abs(Math.sin(n*id*13))*100;
  return [
    {month:'Oct',cbd:Math.round(seed(1)*0.8+20),dops:Math.round(seed(2)*0.7+25),cex:Math.round(seed(3)*0.75+22),iter:Math.round(seed(4)*0.7+25)},
    {month:'Nov',cbd:Math.round(seed(5)*0.8+25),dops:Math.round(seed(6)*0.7+30),cex:Math.round(seed(7)*0.75+27),iter:Math.round(seed(8)*0.7+28)},
    {month:'Dec',cbd:Math.round(seed(9)*0.85+30),dops:Math.round(seed(10)*0.75+35),cex:Math.round(seed(11)*0.8+32),iter:Math.round(seed(12)*0.75+33)},
    {month:'Jan',cbd:Math.round(seed(13)*0.9+40),dops:Math.round(seed(14)*0.8+42),cex:Math.round(seed(15)*0.85+40),iter:Math.round(seed(16)*0.8+40)},
    {month:'Feb',cbd:Math.round(seed(17)*0.9+50),dops:Math.round(seed(18)*0.85+50),cex:Math.round(seed(19)*0.85+48),iter:Math.round(seed(20)*0.85+50)},

  ];
}

function renderExamsTable(){
  const filtered = RES.filter(r => {
    if (S.examSearch && !r.name.toLowerCase().includes(S.examSearch.toLowerCase())) return false;
    if (S.examLvF && r.level !== S.examLvF) return false;
    return true;
  });
  const examTypes = [{key:'WADA'},{key:'OSCE'},{key:'Part1'},{key:'Part2'}];
  const formatScore = (score) => {
    if (score === null || score === undefined) return '<span style="color:var(--tx5)">—</span>';
    const color = score >= 60 ? 'var(--success)' : 'var(--danger)';
    const bg = score >= 60 ? 'var(--success-bg)' : 'var(--danger-bg)';
    return `<span style="display:inline-block;padding:4px 10px;background:${bg};color:${color};border-radius:6px;font-weight:700;min-width:46px;text-align:center;font-family:Lexend">${score}%</span>`;
  };
  return `
    <table>
      <thead>
        <tr>
          <th style="width:40px">#</th><th>Name</th><th>Level</th><th>Group</th>
          <th style="text-align:center">WADA</th>
          <th style="text-align:center">OSCE</th>
          <th style="text-align:center">Part 1</th>
          <th style="text-align:center">Part 2</th>
          <th style="text-align:center">Average</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(r => {
          const scores = examTypes.map(et => {
            if (et.key === 'Part2' && r.level === 'R1') return null;
            return mockExamScore(r.id, et.key);
          });
          const validScores = scores.filter(s => s !== null);
          const avg = validScores.length > 0 ? Math.round(validScores.reduce((a,b)=>a+b,0)/validScores.length) : null;
          return `
            <tr>
              <td style="color:var(--tx4);font-size:11px;font-weight:600">${r.id}</td>
              <td style="font-weight:600">${r.name}</td>
              <td><span class="bd ${r.level==='R1'?'r1c':r.level==='R2'?'r2c':'r3c'}">${r.level}</span></td>
              <td><span class="bd gc">${r.group}</span></td>
              <td style="text-align:center">${formatScore(scores[0])}</td>
              <td style="text-align:center">${formatScore(scores[1])}</td>
              <td style="text-align:center">${formatScore(scores[2])}</td>
              <td style="text-align:center">${formatScore(scores[3])}</td>
              <td style="text-align:center;font-weight:700">${avg !== null ? formatScore(avg) : '—'}</td>
            </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div style="text-align:center;font-size:11.5px;color:var(--tx3);margin-top:14px;padding:12px;background:var(--bg2);border-radius:8px;font-weight:500">
      📊 Showing <strong>${filtered.length}</strong> of ${RES.length} ·
      <span style="color:var(--success)">●</span> Pass (≥60%) ·
      <span style="color:var(--danger)">●</span> Fail (&lt;60%) ·
      <span style="color:var(--tx5)">—</span> Pending
    </div>
  `;
}

function renderExamComparisonChart(){
  const levels = ['R1', 'R2', 'R3'];
  const examTypes = ['WADA', 'OSCE', 'Part1', 'Part2'];
  const examLabels = ['WADA', 'OSCE', 'Part 1', 'Part 2'];
  const data = levels.map(lv => {
    const lvResidents = RES.filter(r => r.level === lv);
    const avgs = examTypes.map(et => {
      const scores = lvResidents.map(r => mockExamScore(r.id, et));
      return Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
    });
    return { level: lv, count: lvResidents.length, avgs: avgs };
  });
  const w = 700, h = 320, p = 50, cw = w - p*2, ch = h - p*2 - 20;
  const groupCount = examLabels.length;
  const barCount = levels.length;
  const groupWidth = cw / groupCount;
  const barWidth = (groupWidth * 0.7) / barCount;
  const groupGap = groupWidth * 0.15;
  const colors = {R1:'#1565C0', R2:'#6A1B9A', R3:'#00838F'};
  const colors2 = {R1:'#42A5F5', R2:'#AB47BC', R3:'#26C6DA'};
  let bars = '';
  data.forEach((lvData, lvIdx) => {
    lvData.avgs.forEach((score, examIdx) => {
      const x = p + examIdx * groupWidth + groupGap + lvIdx * barWidth;
      const barH = (score/100) * ch;
      const y = p + ch - barH;
      bars += `
        <rect x="${x}" y="${y}" width="${barWidth - 2}" height="${barH}"
              fill="url(#bar${lvData.level})" rx="4" filter="url(#bds)"/>
        <text x="${x + (barWidth-2)/2}" y="${y - 6}" text-anchor="middle"
              font-size="11" font-weight="700" fill="${colors[lvData.level]}" font-family="Lexend">${score}</text>
      `;
    });
  });
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;max-height:400px">
      <defs>
        ${levels.map(l=>`
          <linearGradient id="bar${l}" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="${colors2[l]}"/>
            <stop offset="100%" stop-color="${colors[l]}"/>
          </linearGradient>
        `).join('')}
        <filter id="bds"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
      </defs>
      ${[0,25,50,75,100].map(v => {
        const y = p + ch - (v/100)*ch;
        return `<line x1="${p}" y1="${y}" x2="${p+cw}" y2="${y}" stroke="#E3E8F0" stroke-dasharray="3,3"/>
                <text x="${p-8}" y="${y+3}" text-anchor="end" font-size="10" fill="#94A3B8" font-family="Lexend">${v}</text>`;
      }).join('')}
      <line x1="${p}" y1="${p+ch-(60/100)*ch}" x2="${p+cw}" y2="${p+ch-(60/100)*ch}"
            stroke="#C62828" stroke-dasharray="6,3" stroke-width="1.5" opacity="0.6"/>
      <text x="${p+cw+5}" y="${p+ch-(60/100)*ch+3}" font-size="9" font-weight="700" fill="#C62828">60%</text>
      ${bars}
      ${examLabels.map((lbl, i) => {
        const x = p + i * groupWidth + groupWidth/2;
        return `<text x="${x}" y="${h - 25}" text-anchor="middle"
                      font-size="13" font-weight="700" fill="#0A1929" font-family="Inter">${lbl}</text>`;
      }).join('')}
      <text x="15" y="${p+ch/2}" text-anchor="middle" font-size="10" font-weight="600" fill="#475569"
            transform="rotate(-90 15 ${p+ch/2})">Score (%)</text>
    </svg>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:14px;font-size:13px;flex-wrap:wrap">
      ${data.map(d => `
        <span style="display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--bg2);border-radius:8px">
          <span style="width:14px;height:14px;background:linear-gradient(180deg,${colors2[d.level]},${colors[d.level]});border-radius:3px"></span>
          <strong>${d.level}</strong>
          <span style="color:var(--tx3);font-size:11px">${d.count} trainees</span>
        </span>
      `).join('')}
    </div>
  `;
}

function renderLineChart(data){
  const w=600,h=240,p=40,cw=w-p*2,ch=h-p*2;
  const lines=[['cbd','CBD','#1565C0'],['dops','DOPS','#2E7D32'],['cex','Mini-CEX','#6A1B9A'],['iter','ITER','#F57C00']];
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;max-height:280px">
    <defs>
      <filter id="lds"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/></filter>
    </defs>
    ${[0,25,50,75,100].map(v=>`<line x1="${p}" y1="${p+ch-(v/100)*ch}" x2="${p+cw}" y2="${p+ch-(v/100)*ch}" stroke="#E3E8F0" stroke-dasharray="3,3"/><text x="${p-6}" y="${p+ch-(v/100)*ch+3}" text-anchor="end" font-size="10" fill="#94A3B8" font-family="Lexend">${v}</text>`).join('')}
    ${data.map((d,i)=>`<text x="${p+(i/(data.length-1))*cw}" y="${h-8}" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">${d.month}</text>`).join('')}
    ${lines.map(([k,n,c])=>{
      const pts=data.map((d,i)=>`${p+(i/(data.length-1))*cw},${p+ch-(d[k]/100)*ch}`).join(' ');
      return `<polyline points="${pts}" fill="none" stroke="${c}" stroke-width="2.5" filter="url(#lds)"/>${data.map((d,i)=>`<circle cx="${p+(i/(data.length-1))*cw}" cy="${p+ch-(d[k]/100)*ch}" r="4.5" fill="#fff" stroke="${c}" stroke-width="2.5"/>`).join('')}`;
    }).join('')}
  </svg>
  <div style="display:flex;justify-content:center;gap:18px;margin-top:14px;font-size:12px;flex-wrap:wrap">
    ${lines.map(([k,n,c])=>`<span style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--bg2);border-radius:6px"><span style="width:14px;height:3px;background:${c};border-radius:2px"></span><strong>${n}</strong></span>`).join('')}
  </div>`;
}

function attachEvents(){
  const ts=document.getElementById('ts');
  if(ts){
    ts.addEventListener('input',e=>{
      S.search=e.target.value;
      document.getElementById('mc').innerHTML=pageContent();
      attachEvents();
      const newTs=document.getElementById('ts');
      if(newTs){newTs.focus();newTs.setSelectionRange(S.search.length,S.search.length)}
    });
  }
  const tlv=document.getElementById('tlv');
  if(tlv)tlv.addEventListener('change',e=>{S.lvF=e.target.value;renderApp()});
  const tgp=document.getElementById('tgp');
  if(tgp)tgp.addEventListener('change',e=>{S.gpF=e.target.value;renderApp()});
  const ttr=document.getElementById('ttr');
  if(ttr)ttr.addEventListener('change',e=>{S.trF=e.target.value;renderApp()});
  const pr=document.getElementById('pr');
  if(pr)pr.addEventListener('change',e=>{S.pRes=e.target.value;renderApp()});
  const examSearch=document.getElementById('exam-search');
  if(examSearch){
    examSearch.addEventListener('input',e=>{
      S.examSearch=e.target.value;
      document.getElementById('mc').innerHTML=pageContent();
      attachEvents();
      const newSearch=document.getElementById('exam-search');
      if(newSearch){newSearch.focus();newSearch.setSelectionRange(S.examSearch.length,S.examSearch.length)}
    });
  }
  const examLevel=document.getElementById('exam-level');
  if(examLevel)examLevel.addEventListener('change',e=>{S.examLvF=e.target.value;renderApp()});
}

renderApp();
